    <script>
        // 设置通知开关 - 使用统一通知管理器
        document.addEventListener('DOMContentLoaded', () => {
            const notificationsToggle = document.getElementById('sw-notifications-toggle');
            if (notificationsToggle) {
                // 等待统一通知管理器初始化
                const initToggle = () => {
                    if (window.unifiedNotifications && window.unifiedNotifications.initialized) {
                        // 初始化开关状态
                        const status = window.unifiedNotifications.getStatus();
                        notificationsToggle.checked = status.config.enabled;
                        
                        // 监听开关变化
                        notificationsToggle.addEventListener('change', () => {
                            window.unifiedNotifications.toggleNotifications();
                            console.log('🔔 通知开关已切换:', notificationsToggle.checked);
                        });
                    } else {
                        // 如果统一通知管理器还未初始化，稍后再试
                        setTimeout(initToggle, 100);
                    }
                };
                
                initToggle();
            }
        });
    </script>
